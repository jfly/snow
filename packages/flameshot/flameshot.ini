[General]
disabledTrayIcon=true
showDesktopNotification=false
saveLastRegion=true
drawColor=#0000ff
drawThickness=6
savePathFixed=false
showHelp=false
showStartupLaunchMessage=true
startupLaunch=false
saveLastRegion=true
# Workaround for <https://github.com/NixOS/nixpkgs/pull/507424>.
# I guess somebody needs to build a minimal desktop portal for x11 that
# provides screenshotting.
# `xdg-desktop-portal-gtk` dropped that in a huff, lol:
# <https://github.com/flatpak/xdg-desktop-portal-gtk/commit/a3de6baa6140f57a9ea3489636ec854d5df13814>
useX11LegacyScreenshot=true

